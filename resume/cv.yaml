    perfil:
      - |
        Desarrollador Full Stack con foco en TypeScript, React/Next.js y Node.js/NestJS, con productos en producción e integración de APIs de terceros. Enfoque pragmático: entrega rápida sin deuda técnica y criterio build vs buy. Experiencia adicional en arquitecturas agentic con LLMs y automatización de procesos de negocio.
    experiencia_laboral:
      - company: 'Danys Tortas'
        summary: 'Proyecto - Freelancer | [danystortas.com](https://danystortas.com)'
