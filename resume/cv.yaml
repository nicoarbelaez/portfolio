        location: 'Colombia'
        start_date: '2026-01'
        end_date: 'present'
        highlights:
          - 'Desarrollé un agente conversacional en producción que gestiona
            ventas, inventario y pagos 24/7, eliminando el flujo manual de
            atención al cliente.'
          - 'Arquitecté el sistema en NestJS + TypeScript con
            orquestación de herramientas, memoria de conversación y REST API
            + Webhooks integrados con Kommo CRM para recepción de mensajes
            en tiempo real.'
          - 'Implementé selección dinámica de modelos LLM vía OpenRouter
            según costo/latencia por intent, reduciendo costos operativos de
            inferencia.'
          - 'Tecnologías: NestJS, TypeScript, OpenRouter, Kommo CRM API, REST
            API, Webhooks.'

      - company: 'Invictus Joyas'
        summary: 'Proyecto - Freelancer |
          [invictusjoyas.com](https://invictusjoyas.com)'
        position: 'Desarrollador Web Full Stack'
        location: Colombia
        start_date: '2026-04'
        end_date: '2026-05'
        highlights:
          - 'Desarrollé desde cero un e-commerce con catálogo y carrito de
            compras, entregado en producción en un ciclo corto.'
          - 'Definí arquitectura que permite migración futura a SSR sin
            reescribir componentes, priorizando velocidad de entrega sobre
            over-engineering.'
          - 'Tecnologías: Astro, TypeScript, Tailwind CSS.'

      - company: 'Trainer Elitez'
        summary: 'Proyecto - Freelancer'
        position: 'Desarrollador de Software y Automatización'
        location: 'Colombia'
        start_date: '2024'
        end_date: '2026'
        highlights:
          - 'Automaticé el cálculo de macros nutricionales y rutinas de
            entrenamiento personalizadas, eliminando errores manuales críticos
            del negocio fitness.'
          - 'Centralicé la gestión de clientes en una app móvil propia que
            reemplazó hojas de cálculo dispersas usadas por el equipo.'
          - 'Tecnologías: Google Apps Script, Google AppSheet, TypeScript.'

      - company: 'Banco Davivienda'
        position: 'Aprendiz – Programa Nativos Semillero'
        location: 'Colombia'
        start_date: '2025-03'
        end_date: '2026-03'
        highlights:
          - 'Automaticé procesos de back office con Google Apps Script,
            reduciendo tareas operativas manuales del equipo.'
          - 'Desarrollé tableros de visualización para indicadores de captación
            bancaria consumidos por el área de negocio.'
          - 'Tecnologías: Google Apps Script, JavaScript, Google Sheets API.'

    proyectos:
      - name: 'Mecateo'
        summary: '[mecateo.com.co](https://mecateo.com.co)'
        date: 2026
        highlights:
          - 'Desarrollé SaaS POS full stack en MVP para restaurantes: módulos de
            pedidos, stock, comandas, impresión, domicilios e IA para
            recomendaciones y gráficos analíticos.'
          - 'Diseñé REST API en NestJS + TypeScript con
            autenticación vía Better Auth, caché y colas sobre Redis,
            persistencia en PostgreSQL y frontend en Next.js.'
          - 'Stack: Next.js, NestJS, PostgreSQL, Redis, Better
            Auth, TypeScript.'

      - name: 'Living Sports'
        summary: '[github.com/nicoarbelaez/living-sports-app](https://github.com/nicoarbelaez/living-sports-app)'
        date: 2025
        highlights:
          - 'Desarrollé red social fitness móvil con feed, perfiles y
            publicaciones multimedia, como proyecto universitario entregado en
            producción.'
          - 'Integré Supabase para auth, base de datos y storage en tiempo
            real; Cloudinary para optimización y entrega de imágenes.'
          - 'Stack: Expo (React Native), Supabase, Cloudinary,
            TypeScript.'

      - name: 'ReadIA'
        summary: '[readia.vercel.app](https://readia.vercel.app)'
        date: 2025
        highlights:
          - 'Construí plataforma serverless con IA para diagnóstico de
            capacidades TI usando LLMs sobre arquitectura sin servidor.'
          - 'Integré Supabase como capa de persistencia y AWS Lambda
            para lógica de backend desacoplada, desplegada en Vercel.'
          - 'Stack: Next.js, Supabase, Google Gemini API, AWS
            Lambda, Vercel.'

